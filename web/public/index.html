    /* Grade cells */

    .detail-header {

    #detail-content {

    #detail-content .remedy-name {

</head>
<body>
  <div class="container">
    <header>
      <h1>Homeo-Magic</h1>
      <p id="status" class="loading">Loading repertory data...</p>
      <a href="settings.html" style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;color:rgba(255,255,255,0.85);font-size:13px;text-decoration:none;transition:color 0.15s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.85)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Color Settings
      </a>
    </header>

    <div class="search-box">
      <label for="search">Add symptoms:</label>
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Type to search (e.g., headache, anxiety, burning)..." autocomplete="off" disabled>
        <div id="dropdown"></div>
      </div>
    </div>

    <div id="selected"></div>

    <div id="results" class="results-box"></div>
    
    <div id="detail-panel" class="detail-panel" style="display: none;">
      <div class="detail-header">
        <span id="detail-type"></span>
        <button onclick="closeDetail()">×</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <script>
    let symptoms = null;
    let remedies = null;
    let selectedSymptoms = [];
    let hiddenSymptoms = new Set(); // Symptoms hidden from table but not removed
    let minScore = 0; // Minimum score threshold

    // Persist state to sessionStorage so it survives navigation to settings
    function saveState() {
      sessionStorage.setItem('homeo-magic-state', JSON.stringify({
        selectedSymptoms,
        hiddenSymptoms: [...hiddenSymptoms],
        minScore
      }));
    }
    function restoreState() {
      try {
        const raw = sessionStorage.getItem('homeo-magic-state');
        if (!raw) return;
        const data = JSON.parse(raw);
        if (Array.isArray(data.selectedSymptoms)) selectedSymptoms = data.selectedSymptoms;
        if (Array.isArray(data.hiddenSymptoms)) hiddenSymptoms = new Set(data.hiddenSymptoms);
        if (typeof data.minScore === 'number') minScore = data.minScore;
      } catch (e) { /* ignore */ }
    }

    // Fetch with progress
    async function fetchWithProgress(url, onProgress) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const contentLength = response.headers.get('content-length');
      const total = contentLength ? parseInt(contentLength, 10) : 0;
      
      const reader = response.body.getReader();
      const chunks = [];
      let received = 0;
      
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (onProgress) onProgress(received, total);
      }
      
      const allChunks = new Uint8Array(received);
      let position = 0;
      for (const chunk of chunks) {
        allChunks.set(chunk, position);
        position += chunk.length;
      }
      
      const text = new TextDecoder().decode(allChunks);
      return JSON.parse(text);
    }
    
    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // Load data
    async function loadData() {
      const status = document.getElementById('status');
      const search = document.getElementById('search');
      
      try {
        // Load remedies (small file)
        status.innerHTML = '📥 Loading remedies...';
        remedies = await fetchWithProgress('data/remedies.json', (received, total) => {
          status.innerHTML = `📥 Remedies: ${formatBytes(received)}${total ? ' / ' + formatBytes(total) : ''}`;
        });
        status.innerHTML = `✓ Remedies loaded (${Object.keys(remedies).length.toLocaleString()})`;
        
        // Load symptoms (large file ~20MB)
        status.innerHTML = '📥 Loading symptoms (large file)...';
        const startTime = Date.now();
        symptoms = await fetchWithProgress('data/symptoms.json', (received, total) => {
          const pct = total ? Math.round((received / total) * 100) : 0;
          const bar = total ? `<span style="display:inline-block;width:100px;height:8px;background:#D3DCDE;border-radius:4px;overflow:hidden;vertical-align:middle;margin:0 8px"><span style="display:block;width:${pct}%;height:100%;background:#EF9B0C"></span></span>` : '';
          status.innerHTML = `📥 Symptoms: ${formatBytes(received)}${total ? ' / ' + formatBytes(total) : ''} ${bar} ${pct}%`;
        });
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        status.innerHTML = `✓ Loaded in ${elapsed}s`;
        
        // Ready
        await new Promise(r => setTimeout(r, 500)); // Brief pause to show completion
        status.innerHTML = `${Object.keys(symptoms).length.toLocaleString()} symptoms • ${Object.keys(remedies).length.toLocaleString()} remedies`;
        status.classList.remove('loading');
        search.disabled = false;

        // Restore previous state (selected symptoms, filters) if returning from settings
        restoreState();
        if (selectedSymptoms.length) {
          renderSelected();
          renderResults();
        }
        search.focus();
      } catch (e) {
        status.innerHTML = '❌ Error: ' + e.message;
        status.style.color = '#fca5a5';
        console.error(e);
      }
    }

    // Search
    function searchSymptoms(query) {
      if (!symptoms || query.length < 2) return [];
      const q = query.toLowerCase();
      const matches = [];
      for (const sym of Object.keys(symptoms)) {
        if (sym.toLowerCase().includes(q) && !selectedSymptoms.includes(sym)) {
          matches.push(sym);
          if (matches.length >= 50) break;
        }
      }
      return matches;
    }

    function highlightMatch(text, query) {
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return text;
      return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
    }

    function showDropdown(matches) {
      const dd = document.getElementById('dropdown');
      if (!matches.length) {
        dd.classList.remove('show');
        return;
      }
      const query = document.getElementById('search').value;
      dd.innerHTML = matches.map(m => 
        `<div class="dropdown-item" onclick="addSymptom('${m.replace(/'/g, "\\'")}')">${highlightMatch(m, query)}</div>`
      ).join('');
      dd.classList.add('show');
    }

    // Symptom management
    function addSymptom(sym) {
      if (!selectedSymptoms.includes(sym)) {
        selectedSymptoms.push(sym);
        saveState();
        renderSelected();
        renderResults();
      }
      document.getElementById('search').value = '';
      document.getElementById('dropdown').classList.remove('show');
      document.getElementById('search').focus();
    }

    function removeSymptom(sym) {
      selectedSymptoms = selectedSymptoms.filter(s => s !== sym);
      hiddenSymptoms.delete(sym);
      saveState();
      renderSelected();
      renderResults();
    }

    function hideSymptom(sym) {
      hiddenSymptoms.add(sym);
      saveState();
      renderSelected();
      renderResults();
    }

    function showSymptom(sym) {
      hiddenSymptoms.delete(sym);
      saveState();
      renderSelected();
      renderResults();
    }

    function renderSelected() {
      const el = document.getElementById('selected');
      const visible = selectedSymptoms.filter(s => !hiddenSymptoms.has(s));
      const hidden = selectedSymptoms.filter(s => hiddenSymptoms.has(s));
      
      let html = visible.map(s => `
        <span class="symptom-tag">
          ${s}
          <button onclick="removeSymptom('${s.replace(/'/g, "\\'")}')">×</button>
        </span>
      `).join('');
      
      if (hidden.length > 0) {
        html += `<span class="hidden-divider">|</span>`;
        html += hidden.map(s => `
          <span class="symptom-tag hidden-tag" onclick="showSymptom('${s.replace(/'/g, "\\'")}')">
            <span class="hidden-icon"></span>
            ${s}
            <button onclick="event.stopPropagation(); removeSymptom('${s.replace(/'/g, "\\'")}')">×</button>
          </span>
        `).join('');
      }
      
      el.innerHTML = html;
    }

    // Calculate and render results
    function renderResults() {
      const container = document.getElementById('results');
      
      const visibleCount = selectedSymptoms.filter(s => !hiddenSymptoms.has(s)).length;
      
      if (!selectedSymptoms.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <p>Search and select symptoms above to find matching remedies</p>
          </div>`;
        return;
      }
      
      if (!visibleCount) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">👁</div>
            <p>All ${selectedSymptoms.length} symptoms are hidden. Click a hidden symptom above to show it.</p>
          </div>`;
        return;
      }

      // Calculate scores (only visible symptoms)
      const visibleSymptoms = selectedSymptoms.filter(s => !hiddenSymptoms.has(s));
      const scores = {};
      const gradeMap = {}; // remedy -> symptom -> grade
      
      for (const sym of visibleSymptoms) {
        const data = symptoms[sym];
        if (!data) continue;
        for (const [rem, grade] of Object.entries(data.remedies)) {
          if (!scores[rem]) {
            scores[rem] = 0;
            gradeMap[rem] = {};
          }
          scores[rem] += grade;
          gradeMap[rem][sym] = grade;
        }
      }

      // Sort by score
      const allSorted = Object.entries(scores)
        .sort((a, b) => b[1] - a[1]);

      if (!allSorted.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">😔</div>
            <p>No remedies found for these symptoms</p>
          </div>`;
        return;
      }

      // Normalize to 100 (top remedy = 100)
      const maxScore = allSorted[0][1];
      const allNormalized = allSorted.map(([rem, score]) => [rem, Math.round((score / maxScore) * 100), score]);
      
      // Filter by minScore and limit to 40
      const filtered = allNormalized.filter(([_, normScore]) => normScore >= minScore);
      const sorted = filtered.slice(0, 40);
      const normalizedScores = sorted.map(([rem, normScore]) => [rem, normScore]);

      // Build table
      const totalRemedies = allNormalized.length;
      const shownRemedies = sorted.length;
      const hiddenRemedies = filtered.length - shownRemedies;
      
      let html = `
        <div class="results-header">${totalRemedies} Remedies Found</div>
        <div class="filter-bar">
          <label>Min score:</label>
          <input type="range" id="scoreSlider" min="0" max="100" value="${minScore}" oninput="updateMinScore(this.value)">
          <span class="score-display" id="scoreDisplay">${minScore}</span>
          ${minScore > 0 ? `<button class="secondary" onclick="resetFilter()">Reset</button>` : ''}
          <span class="filter-info">
            Showing ${shownRemedies} of ${filtered.length} remedies (≥${minScore})
            ${hiddenRemedies > 0 ? ` • ${hiddenRemedies} more below` : ''}
          </span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th class="symptom-header">Analysis</th>
                ${sorted.map(([rem]) => `<th class="remedy-header" onclick="showRemedyDetail('${rem.replace(/'/g, "\\'")}')" title="Click to see remedy details">${rem}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              <tr class="score-row">
                <td>Score</td>
                ${normalizedScores.map(([rem, score]) => {
                  const scoreColor = getScoreColor(score / 100);
                  const r = parseInt(scoreColor.slice(1,3), 16), g = parseInt(scoreColor.slice(3,5), 16), b = parseInt(scoreColor.slice(5,7), 16);
                  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                  const fg = lum > 0.55 ? '#1f2937' : '#ffffff';
                  return `<td onclick="setMinScore(${score})" title="Click to set minimum score to ${score}" style="background:${scoreColor};color:${fg}">${score}</td>`;
                }).join('')}
              </tr>
              ${selectedSymptoms.filter(sym => !hiddenSymptoms.has(sym)).map(sym => {
                const symData = symptoms[sym];
                const symCount = symData ? Object.keys(symData.remedies).length : 0;
                return `
                  <tr class="symptom-row">
                    <td onclick="showSymptomDetail('${sym.replace(/'/g, "\\'")}')">
                      <div class="symptom-cell">
                        <button class="action-btn hide-btn" onclick="event.stopPropagation(); hideSymptom('${sym.replace(/'/g, "\\'")}')">
                          <span class="icon-eye icon-eye-open"></span>
                        </button>
                        <span class="symptom-name">${sym}</span>
                        <span style="color:#9ca3af;font-size:11px">(${symCount})</span>
                        <button class="action-btn remove-btn" onclick="event.stopPropagation(); removeSymptom('${sym.replace(/'/g, "\\'")}')">
                          <span class="icon-trash"></span>
                        </button>
                      </div>
                    </td>
                    ${sorted.map(([rem]) => {
                      const grade = gradeMap[rem]?.[sym];
                      if (!grade) return '<td></td>';
                      return `<td><span class="grade grade-${grade}">${grade}</span></td>`;
                    }).join('')}
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;

      container.innerHTML = html;
    }

    // Detail panel functions
    function showRemedyDetail(abbrev) {
      const fullName = remedies[abbrev] || abbrev;
      const panel = document.getElementById('detail-panel');
      const typeEl = document.getElementById('detail-type');
      const contentEl = document.getElementById('detail-content');
      
      typeEl.textContent = 'Remedy';
      contentEl.innerHTML = `
        <div class="remedy-name">${fullName}</div>
        <div class="remedy-abbrev">Abbreviation: ${abbrev}</div>
      `;
      panel.style.display = 'block';
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function showSymptomDetail(symptomName) {
      const symData = symptoms[symptomName];
      const panel = document.getElementById('detail-panel');
      const typeEl = document.getElementById('detail-type');
      const contentEl = document.getElementById('detail-content');
      
      if (!symData) {
        typeEl.textContent = 'Symptom';
        contentEl.innerHTML = `<div class="symptom-text">${symptomName}</div>`;
      } else {
        const remedyCount = Object.keys(symData.remedies).length;
        // Get top remedies for this symptom
        const topRemedies = Object.entries(symData.remedies)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 20);
        
        typeEl.textContent = 'Symptom';
        contentEl.innerHTML = `
          <div class="symptom-text">${symptomName}</div>
          <div class="symptom-info">
            <strong>${remedyCount}</strong> remedies cover this symptom
            <div class="remedy-list">
              ${topRemedies.map(([rem, grade]) => 
                `<span class="remedy-badge grade-${grade}" onclick="showRemedyDetail('${rem.replace(/'/g, "\\'")}')" style="cursor:pointer">${rem} (${grade})</span>`
              ).join('')}
              ${remedyCount > 20 ? `<span style="color:#6b7280">...and ${remedyCount - 20} more</span>` : ''}
            </div>
          </div>
        `;
      }
      panel.style.display = 'block';
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function closeDetail() {
      document.getElementById('detail-panel').style.display = 'none';
    }

    // Filter functions
    function setMinScore(score) {
      minScore = score;
      saveState();
      renderResults();
    }

    function updateMinScore(value) {
      minScore = parseInt(value);
      document.getElementById('scoreDisplay').textContent = minScore;
      saveState();
      renderResults();
    }

    function resetFilter() {
      minScore = 0;
      saveState();
      renderResults();
    }
    
    function filterToRemedy(remedyName) {
      // Find the score of this remedy and set minScore to it
      const container = document.getElementById('results');
      const headers = container.querySelectorAll('.remedy-header');
      const scores = container.querySelectorAll('.score-row td:not(:first-child)');
      
      for (let i = 0; i < headers.length; i++) {
        if (headers[i].textContent === remedyName) {
          const score = parseInt(scores[i].textContent);
          setMinScore(score);
          break;
        }
      }
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', e => {
      showDropdown(searchSymptoms(e.target.value));
    });

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('dropdown').classList.remove('show');
      }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrapper')) {
        document.getElementById('dropdown').classList.remove('show');
      }
    });

    // Color scale for scores (0-1 range)
    let scoreChromaScale = chroma.scale(['#fef3c7', '#fca5a5']).mode('lab');
    
    function getScoreColor(t) {
      // t is 0-1 (normalized score / 100)
      return scoreChromaScale(t).hex();
    }

    // Apply saved color scale from settings
    function applyColorScale() {
      try {
        const raw = localStorage.getItem('homeo-magic-color-scale');
        if (!raw) return;
        const data = JSON.parse(raw);
        const scale = data.scale;
        if (!Array.isArray(scale) || scale.length < 3) return;
        
        // Build chroma scale from saved colors for score heat-mapping
        scoreChromaScale = chroma.scale(scale).mode(data.mode || 'lab');
        
        // Remove old dynamic styles if any
        let styleEl = document.getElementById('dynamic-grade-styles');
        if (!styleEl) {
          styleEl = document.createElement('style');
          styleEl.id = 'dynamic-grade-styles';
          document.head.appendChild(styleEl);
        }
        // Generate grade-1 through grade-N styles
        let css = '';
        for (let i = 0; i < scale.length; i++) {
          const bg = scale[i];
          const r = parseInt(bg.slice(1,3), 16), g = parseInt(bg.slice(3,5), 16), b = parseInt(bg.slice(5,7), 16);
          const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          const fg = lum > 0.55 ? '#1f2937' : '#ffffff';
          css += `.grade-${i + 1}, .remedy-badge.grade-${i + 1} { background: ${bg} !important; color: ${fg} !important; }\n`;
        }
        styleEl.textContent = css;
      } catch (e) { /* ignore */ }
    }
    applyColorScale();

    // Initialize
    loadData();
    renderResults();
  </script>
</body>
</html>
