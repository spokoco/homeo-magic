<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .meta { width: 120px; flex-shrink: 0; }
  .tag { font: 700 10px/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
  .spec { font: 400 11px/1.4 var(--font-mono); color: var(--fg-3); margin-top: 3px; }
  .specimen { color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta"><div class="tag">H1</div><div class="spec">48 · 700 · tight</div></div>
    <div class="specimen" style="font:700 48px/1.15 var(--font-sans);letter-spacing:-0.01em">Homeo<span style="color:var(--teal)">·</span>Magic</div>
  </div>
  <div class="row">
    <div class="meta"><div class="tag">H2</div><div class="spec">28 · 700 · snug</div></div>
    <div class="specimen" style="font:700 28px/1.3 var(--font-sans)">Analysis results</div>
  </div>
  <div class="row">
    <div class="meta"><div class="tag">H3</div><div class="spec">22 · 700 · snug</div></div>
    <div class="specimen" style="font:700 22px/1.3 var(--font-sans)">Rubric cross-references</div>
  </div>
</body>
</html>
