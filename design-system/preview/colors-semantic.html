<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .eyebrow { font: 700 10px/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-accent); margin-bottom: 10px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sw { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border); background: var(--paper); }
  .chip { height: 48px; display: flex; align-items: center; justify-content: center; font: 700 12px/1 var(--font-sans); }
  .meta { padding: 6px 8px; }
  .name { font: 700 11px/1.2 var(--font-sans); color: var(--fg-1); }
  .role { font: 400 10px/1.3 var(--font-sans); color: var(--fg-3); margin-top: 1px; }
</style>
</head>
<body>
  <div class="eyebrow">Semantic tokens</div>
  <div class="row">
    <div class="sw"><span class="chip" style="background:var(--bg-herb);color:var(--ink)">Aa</span><div class="meta"><div class="name">bg-herb</div><div class="role">sage-soft · empty states</div></div></div>
    <div class="sw"><span class="chip" style="background:var(--bg-signal);color:var(--teal-deep)">Aa</span><div class="meta"><div class="name">bg-signal</div><div class="role">teal-soft · hints</div></div></div>
    <div class="sw"><span class="chip" style="background:var(--bg-sunken);color:var(--ink)">Aa</span><div class="meta"><div class="name">bg-sunken</div><div class="role">table headers</div></div></div>
    <div class="sw"><span class="chip" style="background:var(--ink);color:var(--paper)">Aa</span><div class="meta"><div class="name">bg-dark</div><div class="role">hero/banners</div></div></div>
    <div class="sw"><span class="chip" style="background:var(--teal);color:#fff">Aa</span><div class="meta"><div class="name">fg-accent</div><div class="role">active · links</div></div></div>
    <div class="sw"><span class="chip" style="background:var(--teal-deep);color:#fff">Aa</span><div class="meta"><div class="name">teal-deep</div><div class="role">hover on teal</div></div></div>
    <div class="sw"><span class="chip" style="background:var(--sage);color:var(--ink)">Aa</span><div class="meta"><div class="name">sage</div><div class="role">supportive</div></div></div>
    <div class="sw"><span class="chip" style="background:var(--paper);color:var(--ink);border-top:1px solid var(--border)">Aa</span><div class="meta"><div class="name">paper</div><div class="role">default surface</div></div></div>
  </div>
</body>
</html>
