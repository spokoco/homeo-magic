<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Neutral Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .eyebrow { font: 700 10px/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-accent); margin-bottom: 10px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border); background: var(--paper); }
  .chip { height: 56px; display: block; }
  .meta { padding: 6px 8px; }
  .name { font: 700 11px/1.2 var(--font-sans); color: var(--fg-1); }
  .hex { font: 400 10px/1.3 var(--font-mono); color: var(--fg-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="eyebrow">Ink neutrals · derived ramp</div>
  <div class="row">
    <div class="sw"><span class="chip" style="background:#151817"></span><div class="meta"><div class="name">ink</div><div class="hex">#151817</div></div></div>
    <div class="sw"><span class="chip" style="background:#2a2d2c"></span><div class="meta"><div class="name">ink-90</div><div class="hex">#2a2d2c</div></div></div>
    <div class="sw"><span class="chip" style="background:#4a4f4d"></span><div class="meta"><div class="name">ink-70</div><div class="hex">#4a4f4d</div></div></div>
    <div class="sw"><span class="chip" style="background:#7a807d"></span><div class="meta"><div class="name">ink-50</div><div class="hex">#7a807d</div></div></div>
    <div class="sw"><span class="chip" style="background:#b5bab7"></span><div class="meta"><div class="name">ink-30</div><div class="hex">#b5bab7</div></div></div>
    <div class="sw"><span class="chip" style="background:#dde0dd"></span><div class="meta"><div class="name">ink-15</div><div class="hex">#dde0dd</div></div></div>
    <div class="sw"><span class="chip" style="background:#f5f6f4"></span><div class="meta"><div class="name">ink-04</div><div class="hex">#f5f6f4</div></div></div>
  </div>
</body>
</html>
