<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .eyebrow { font: 700 10px/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-accent); margin-bottom: 14px; }
  input { width: 100%; font: 400 15px/1 var(--font-sans); padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--r-md); background: var(--paper); color: var(--fg-1); outline: none; box-sizing: border-box; }
  input:focus { border-color: var(--teal); box-shadow: var(--ring-focus); }
  label { display:block; font: 700 12px/1 var(--font-sans); letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-2); margin-bottom: 6px; }
  .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--fg-3); }
  .wrap { position: relative; }
  .wrap input { padding-left: 38px; }
  .stack { margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="eyebrow">Text inputs</div>
  <div class="stack">
    <label>Add rubric</label>
    <div class="wrap">
      <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Type to search (e.g., headache, anxiety, burning)..." value="headache, morning">
    </div>
  </div>
  <div class="stack">
    <label>Disabled</label>
    <input disabled placeholder="Loading index..." style="background:var(--bg-sunken);color:var(--fg-3);cursor:not-allowed">
  </div>
</body>
</html>
