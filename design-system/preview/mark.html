<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mark & potency</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); display:flex; gap: 28px; align-items:center; }
  .eyebrow { font: 700 10px/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-accent); margin-bottom:10px; }
  .item { text-align: center; }
  .lab { font: 700 10px/1 var(--font-sans); letter-spacing:0.1em; text-transform:uppercase; color: var(--fg-3); margin-top:8px; }
  .caption { font: 400 11px/1.4 var(--font-sans); color: var(--fg-2); margin-top: 4px; max-width:120px; }
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Marks</div>
    <div style="display:flex;gap:22px">
      <div class="item"><img src="../assets/mark.svg" width="80" alt=""><div class="lab">Mark · 80</div></div>
      <div class="item"><img src="../assets/mark.svg" width="40" alt=""><div class="lab">Mark · 40</div></div>
      <div class="item"><img src="../assets/potency-dot.svg" width="32" alt=""><div class="lab">Potency dot</div><div class="caption">Signal bullet, favicon</div></div>
    </div>
  </div>
</body>
</html>
